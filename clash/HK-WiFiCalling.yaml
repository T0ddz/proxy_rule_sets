  # 香港 SIM 卡 Wi-Fi Calling 配置规则
  # 适用于 CSL、CMHK、3 HK 的香港 SIM 卡
  # 分流节点须是香港节点

  # 地区检测
  #- DOMAIN-SUFFIX,gspe1-ssl.ls.apple.com

  # 端口代理
  # 原 Shadowrocket:
  # AND,((GEOIP,HK),(AND,((PROTOCOL,UDP),(OR,((DEST-PORT,500),(DEST-PORT,4500),(DEST-PORT,16384–16403))))))
  - AND,((GEOIP,HK),(NETWORK,UDP),(OR,((DST-PORT,500),(DST-PORT,4500),(DST-PORT,16384-16403))))

